<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>賽博纏論</title>
  <script src="js/lightweight-charts.js"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <div class="logo">賽博纏論 v3 <span class="paper-badge">PAPER</span></div>
    <div class="header-center">
      <span id="ticker-price">—</span>
      <span id="ticker-change" class="ticker-change">—</span>
    </div>
    <div class="controls">
      <select id="symbol-select">
        <option value="BTCUSDT">BTC/USDT</option>
        <option value="ETHUSDT">ETH/USDT</option>
        <option value="SOLUSDT">SOL/USDT</option>
        <option value="BNBUSDT">BNB/USDT</option>
      </select>
      <select id="interval-select">
        <option value="1m">1m</option>
        <option value="3m">3m</option>
        <option value="5m">5m</option>
        <option value="15m">15m</option>
        <option value="30m">30m</option>
        <option value="1h">1h</option>
        <option value="4h">4h</option>
        <option value="1d">1d</option>
      </select>
      <span class="dot" id="ws-status" title="WebSocket 狀態"></span>
      <span id="ws-count" style="font-size:10px;color:#8b949e;min-width:40px">—</span>
      <a href="backtest.html" style="font-size:11px;padding:3px 10px;border:1px solid #f0b90b;border-radius:4px;color:#f0b90b;text-decoration:none;background:rgba(240,185,11,.1)">回測</a>
    </div>
  </header>

  <div class="main-grid">

    <div class="chart-panel">
      <div id="chart"></div>
    </div>

    <aside class="sidebar">

      <!-- 帳戶 -->
      <div class="panel">
        <div class="panel-header">
          <span>帳戶</span>
          <button class="icon-btn danger" onclick="resetAccount()" title="重置帳戶">重置</button>
        </div>
        <div class="account-grid">
          <span class="label">錢包餘額</span>   <span id="acc-balance">—</span>
          <span class="label">未實現損益</span> <span id="acc-pnl">—</span>
          <span class="label">可用保證金</span> <span id="acc-avail">—</span>
        </div>
      </div>

      <!-- 下單 -->
      <div class="panel">
        <div class="panel-header"><span>下單</span></div>

        <div class="side-tabs">
          <button class="side-tab active long" data-side="BUY">做多 Long</button>
          <button class="side-tab short" data-side="SELL">做空 Short</button>
        </div>

        <div class="form-row">
          <label>類型</label>
          <select id="order-type">
            <option value="MARKET">市價</option>
            <option value="LIMIT">限價</option>
          </select>
        </div>

        <div class="form-row" id="price-row" style="display:none">
          <label>價格 (USDT)</label>
          <input type="number" id="order-price" placeholder="0.00" step="0.01" min="0" />
        </div>

        <div class="form-row">
          <label>數量</label>
          <input type="number" id="order-qty" placeholder="0.001" step="0.001" min="0" />
        </div>

        <div class="form-row">
          <label>槓桿</label>
          <select id="order-leverage">
            <option value="1">1x</option>
            <option value="3">3x</option>
            <option value="5">5x</option>
            <option value="10" selected>10x</option>
            <option value="20">20x</option>
            <option value="50">50x</option>
            <option value="100">100x</option>
          </select>
        </div>

        <button id="submit-btn" class="submit-btn long" onclick="placeOrder()">做多 Long</button>
        <div id="order-msg" class="order-msg"></div>
      </div>

    </aside>
  </div>

  <div class="bottom-grid">

    <div class="panel bottom-panel">
      <div class="panel-header"><span>持倉</span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>幣對</th><th>方向</th><th>槓桿</th>
              <th>開倉均價</th><th>標記價格</th><th>數量</th><th>未實損益</th>
            </tr>
          </thead>
          <tbody id="positions-body">
            <tr><td colspan="7" class="empty">無持倉</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel bottom-panel">
      <div class="panel-header"><span>委託單</span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>幣對</th><th>方向</th><th>類型</th>
              <th>價格</th><th>數量</th><th>狀態</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="orders-body">
            <tr><td colspan="7" class="empty">無委託單</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="js/app.js?v=4"></script>
</body>
</html>
